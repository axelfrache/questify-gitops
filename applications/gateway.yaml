apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: questify-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: questify

  source:
    repoURL: https://github.com/axelfrache/questify.git
    targetRevision: HEAD
    path: charts/questify-gateway
    helm:
      releaseName: questify-gateway
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: questify

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
